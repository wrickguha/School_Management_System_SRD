name: Deploy to GoDaddy Production

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy Application
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout codebase
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      # 3. Build React Frontend
      - name: Install Frontend Dependencies & Build
        run: |
          npm ci
          npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: https://subhraedu.com/api

      # 4. Integrate Frontend Assets into Laravel Public Folder
      - name: Copy Frontend Assets to Laravel Public
        run: |
          cp -r ./frontend/dist/* ./backend/public/

      # 5. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, mysql, zip
          coverage: none

      # 6. Build Backend Dependencies (Locally in Runner to ensure correct lock files)
      - name: Install Composer Dependencies
        run: |
          composer install --no-dev --optimize-autoloader
        working-directory: ./backend

      # 6.5. Zip the Backend Vendor Folder
      - name: Zip Vendor Folder
        run: |
          zip -r vendor.zip vendor
        working-directory: ./backend

      # 7. Upload Combined App to GoDaddy via FTP (EXCLUDING the massive vendor/ folder) using LFTP
      - name: Deploy via FTP (lftp)
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -c "
            set ftp:ssl-allow no;
            set ftp:use-site-chmod no;
            open -u '${{ secrets.FTP_USERNAME }}','${{ secrets.FTP_PASSWORD }}' '${{ secrets.FTP_SERVER }}';
            mirror -R \
              --no-perms \
              --exclude-glob .git/ \
              --exclude-glob .github/ \
              --exclude-glob node_modules/ \
              --exclude-glob vendor/ \
              --exclude-glob .env \
              --exclude-glob tests/ \
              --exclude-glob database/database.sqlite \
              --verbose \
              ./backend/ .
          "

      # 8. Trigger Remote Laravel Setup & Migrations
      - name: Trigger Remote Database Migrations & Cache Clear
        continue-on-error: true
        run: |
          echo "Extracting remote vendor dependencies..."
          curl -f -s "https://subhraedu.com/unzip-vendor.php?secret=${{ secrets.DEPLOY_SECRET }}"
          echo "Running remote migrations..."
          curl -f -s "https://subhraedu.com/deploy-utility?secret=${{ secrets.DEPLOY_SECRET }}&action=migrate"
          echo "Clearing remote cache and optimizing..."
          curl -f -s "https://subhraedu.com/deploy-utility?secret=${{ secrets.DEPLOY_SECRET }}&action=optimize"

